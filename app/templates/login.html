<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — IT Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background:#060d1f;
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    canvas#bg { position:fixed; inset:0; z-index:0; }

    .wrap {
      position:relative; z-index:1;
      width:100%; max-width:400px;
      padding:20px;
      animation:fadeUp .5s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .brand { text-align:center; margin-bottom:28px; }
    .brand-icon {
      width:54px; height:54px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      border-radius:15px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:26px; margin-bottom:16px;
      box-shadow:0 4px 24px rgba(99,102,241,.5);
      animation:glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { box-shadow:0 4px 16px rgba(99,102,241,.4); }
      to   { box-shadow:0 4px 32px rgba(139,92,246,.7),0 0 60px rgba(99,102,241,.2); }
    }
    .brand h1 { font-size:22px; font-weight:800; color:#f8fafc; letter-spacing:-.4px; }
    .brand p  { font-size:13px; color:#64748b; margin-top:5px; }

    .card {
      background:rgba(15,23,42,.85);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:32px;
      box-shadow:0 24px 64px rgba(0,0,0,.5);
      backdrop-filter:blur(16px);
    }
    .card h2   { font-size:16px; font-weight:700; color:#f1f5f9; margin-bottom:4px; }
    .subtitle  { font-size:13px; color:#64748b; margin-bottom:24px; }

    label {
      display:block; font-size:11px; font-weight:700;
      color:#64748b; text-transform:uppercase; letter-spacing:.7px; margin-bottom:7px;
    }
    .input-wrap { position:relative; margin-bottom:20px; }
    input[type=password] {
      width:100%; padding:12px 14px;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:10px; font-size:14px;
      color:#f1f5f9; font-family:inherit; outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    input[type=password]:focus {
      border-color:#6366f1;
      box-shadow:0 0 0 3px rgba(99,102,241,.2);
    }
    input[type=password]::placeholder { color:#334155; }

    .btn-signin {
      width:100%; padding:12px;
      background:linear-gradient(135deg,#6366f1,#4f46e5);
      color:#fff; border:none; border-radius:10px;
      font-size:14px; font-weight:700;
      cursor:pointer; font-family:inherit;
      transition:all .2s;
      box-shadow:0 2px 12px rgba(99,102,241,.4);
      letter-spacing:.2px;
    }
    .btn-signin:hover {
      background:linear-gradient(135deg,#4f46e5,#4338ca);
      box-shadow:0 4px 20px rgba(99,102,241,.6);
      transform:translateY(-1px);
    }
    .btn-signin:active { transform:translateY(0); }

    .divider {
      display:flex; align-items:center; gap:12px;
      margin:18px 0; color:#334155; font-size:12px;
    }
    .divider::before,.divider::after {
      content:''; flex:1; height:1px; background:rgba(255,255,255,.08);
    }

    .btn-bio {
      width:100%; padding:11px;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:10px; font-size:13px; font-weight:600;
      color:#94a3b8; cursor:pointer; font-family:inherit;
      display:flex; align-items:center; justify-content:center; gap:9px;
      transition:all .2s;
    }
    .btn-bio:hover {
      background:rgba(99,102,241,.15);
      border-color:rgba(99,102,241,.4);
      color:#a5b4fc;
    }
    .bio-icon { font-size:20px; }

    .alert {
      padding:10px 14px; border-radius:8px;
      font-size:13px; margin-bottom:18px;
      background:rgba(239,68,68,.15);
      color:#fca5a5; border:1px solid rgba(239,68,68,.25);
      display:flex; align-items:center; gap:7px;
    }
    .hint {
      text-align:center; font-size:12px;
      color:#1e293b; margin-top:18px;
    }
    .hint code {
      background:rgba(255,255,255,.06);
      padding:2px 7px; border-radius:5px;
      font-family:'Courier New',monospace; color:#64748b;
    }

    /* Bio status messages */
    #bioStatus { font-size:12px; color:#64748b; text-align:center; margin-top:10px; min-height:18px; }
    #bioStatus.ok  { color:#34d399; }
    #bioStatus.err { color:#f87171; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <h1>IT Admin Panel</h1>
    <p>Management Console</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">✕ {{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="loginForm">
      <label for="password">Admin Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password"
               placeholder="Enter your password" autofocus required>
      </div>
      <button type="submit" class="btn-signin">Sign In →</button>
    </form>

    <div class="divider">or</div>

    <button class="btn-bio" id="bioBtn" onclick="biometricLogin()">
      <span class="bio-icon">🔐</span>
      Sign in with Biometrics
    </button>
    <button class="btn-bio" id="bioRegBtn" onclick="biometricRegister()"
            style="margin-top:8px;font-size:12px;padding:8px">
      <span style="font-size:14px">⊕</span> Register this device
    </button>
    <div id="bioStatus"></div>
  </div>

  <p class="hint">Default password: <code>admin123</code></p>
</div>

<!-- Canvas particle animation -->
<script>
(function(){
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [], lines = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - .5) * .4;
    this.vy = (Math.random() - .5) * .4;
    this.r  = Math.random() * 1.5 + .5;
    this.a  = Math.random() * .6 + .2;
  }

  function init() {
    resize();
    particles = Array.from({length: 90}, () => new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(99,102,241,0.04)';
    ctx.lineWidth   = 1;
    const step = 60;
    for (let x = 0; x < W; x += step) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    // Particles + connections
    particles.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(139,92,246,${p.a})`;
      ctx.fill();

      for (let j = i+1; j < particles.length; j++) {
        const q = particles[j];
        const d = Math.hypot(p.x-q.x, p.y-q.y);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `rgba(99,102,241,${.15*(1-d/120)})`;
          ctx.lineWidth   = .6;
          ctx.stroke();
        }
      }
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
})();
</script>

<!-- WebAuthn biometrics -->
<script>
function bioStatus(msg, cls) {
  const el = document.getElementById('bioStatus');
  el.textContent = msg;
  el.className   = cls || '';
}

async function biometricRegister() {
  if (!window.PublicKeyCredential) {
    bioStatus('Biometrics not supported in this browser.', 'err'); return;
  }
  try {
    bioStatus('Waiting for biometric…');
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp:   { name: 'IT Admin Panel' },
        user: { id: new TextEncoder().encode('admin'), name: 'admin', displayName: 'Admin' },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
        authenticatorSelection: { userVerification: 'required' },
        timeout: 30000,
      }
    });
    const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    const res = await fetch('/api/webauthn/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ credentialId: credId }),
    });
    if ((await res.json()).ok) {
      localStorage.setItem('bioCredId', credId);
      bioStatus('Device registered! You can now sign in with biometrics.', 'ok');
    }
  } catch(e) {
    bioStatus('Registration cancelled or failed: ' + e.message, 'err');
  }
}

async function biometricLogin() {
  if (!window.PublicKeyCredential) {
    bioStatus('Biometrics not supported in this browser.', 'err'); return;
  }
  try {
    bioStatus('Waiting for biometric…');
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const cred = await navigator.credentials.get({
      publicKey: {
        challenge,
        userVerification: 'required',
        timeout: 30000,
      }
    });
    const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    const res = await fetch('/api/webauthn/authenticate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ credentialId: credId }),
    });
    const data = await res.json();
    if (data.ok) {
      bioStatus('Authenticated! Redirecting…', 'ok');
      setTimeout(() => location.href = '/', 600);
    } else {
      bioStatus('Device not recognized. Register first.', 'err');
    }
  } catch(e) {
    bioStatus('Biometric sign-in cancelled.', 'err');
  }
}
</script>
</body>
</html>
