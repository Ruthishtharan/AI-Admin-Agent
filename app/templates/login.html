<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — IT Admin Panel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;
          box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e2e8f0}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:20px;font-weight:800;color:#1a1a2e}
    .logo p{font-size:13px;color:#718096;margin-top:4px}
    label{display:block;font-size:13px;font-weight:600;color:#2d3748;margin-bottom:6px}
    input{width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;
          font-size:14px;outline:none;transition:border-color .15s}
    input:focus{border-color:#4361ee;box-shadow:0 0 0 3px rgba(67,97,238,.1)}
    .btn{width:100%;padding:11px;background:#4361ee;color:#fff;border:none;border-radius:8px;
         font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;transition:background .15s}
    .btn:hover{background:#3451d1}
    .alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;
           background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .hint{text-align:center;font-size:12px;color:#a0aec0;margin-top:16px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>IT Admin Panel</h1>
      <p>Enter your admin password to continue</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div style="margin-bottom:16px">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter admin password" autofocus required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <p class="hint">Default password: <code>admin123</code> — set ADMIN_PASSWORD in secrets to change</p>
  </div>
</body>
</html>
