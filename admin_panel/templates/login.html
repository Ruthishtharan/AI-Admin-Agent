<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — IT Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
      background: #0f172a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .wrap {
      position: relative; z-index: 1;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      width: 380px; padding: 40px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 4px 12px rgba(99,102,241,.4);
    }
    .logo-text h1 { font-size: 17px; font-weight: 800; color: #f1f5f9; }
    .logo-text p  { font-size: 12px; color: #64748b; margin-top: 1px; }

    label {
      display: block; font-weight: 600; color: #94a3b8;
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 7px;
    }
    input[type=password] {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 7px; color: #f1f5f9;
      font-size: 14px; margin-bottom: 20px;
      transition: border-color .15s;
    }
    input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    input::placeholder { color: #475569; }
    button[type=submit] {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg,#6366f1,#4f46e5);
      color: #fff; border: none; border-radius: 7px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(99,102,241,.4);
      transition: all .15s;
    }
    button[type=submit]:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.5); }
    .error-msg {
      background: rgba(248,113,113,.1); color: #f87171;
      border: 1px solid rgba(248,113,113,.2);
      padding: 10px 14px; border-radius: 7px;
      font-size: 13px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-icon">⚙</div>
      <div class="logo-text">
        <h1>IT Admin Panel</h1>
        <p>Secure administrator access</p>
      </div>
    </div>

    {% if error %}
      <div class="error-msg">✕ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="password">Admin Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter admin password"
        autofocus
      >
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
