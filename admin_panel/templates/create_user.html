{% extends "base.html" %}
{% block title %}Create User — IT Admin Panel{% endblock %}
{% block content %}

<div class="page-header">
  <h1>Create New User</h1>
  <a href="/users" class="btn btn-ghost btn-sm">← Back to Users</a>
</div>

<div class="card" style="max-width:560px">
  <form method="POST" action="/users/create">

    <div class="form-group">
      <label for="name">Full Name</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="e.g. Alice Chen"
        required
      >
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="e.g. alice.chen@company.com"
        required
      >
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" name="role">
        {% for r in roles %}
        <option value="{{ r }}">{{ r|capitalize }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="department">Department</label>
      <select id="department" name="department" required>
        <option value="">— Select a department —</option>
        {% for dept in departments %}
        <option value="{{ dept }}">{{ dept }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="license">License</label>
      <select id="license" name="license">
        {% for lic in licenses %}
        <option value="{{ lic }}">{{ lic }}</option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Create User</button>
      <a href="/users" class="btn btn-ghost">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
